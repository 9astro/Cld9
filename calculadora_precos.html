<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Preços - PDV vs Encarte</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #1a1a2e;
            --secondary: #16c784;
            --danger: #e63946;
            --neutral: #9ca3af;
            --light: #f9fafb;
            --surface: #ffffff;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 20px 50px rgba(0, 0, 0, 0.15);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        .card {
            background: var(--surface);
            border-radius: 16px;
            padding: 40px 30px;
            box-shadow: var(--shadow-lg);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 35px;
        }

        .header h1 {
            font-size: 28px;
            color: var(--primary);
            margin-bottom: 8px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .header p {
            font-size: 13px;
            color: var(--neutral);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            font-size: 16px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            transition: all 0.3s ease;
            font-family: 'Segoe UI', sans-serif;
            background: var(--light);
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            background: var(--surface);
            box-shadow: 0 0 0 3px rgba(26, 26, 46, 0.1);
        }

        input::placeholder {
            color: #d1d5db;
        }

        .buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 32px;
        }

        button {
            padding: 14px 24px;
            font-size: 15px;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-calcular {
            background: var(--primary);
            color: white;
            grid-column: 1 / -1;
            font-size: 16px;
            padding: 16px;
        }

        .btn-calcular:hover {
            background: #0f0f1f;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(26, 26, 46, 0.3);
        }

        .btn-limpar {
            background: var(--light);
            color: var(--primary);
            border: 2px solid #e5e7eb;
        }

        .btn-limpar:hover {
            background: #f3f4f6;
            border-color: var(--primary);
        }

        .resultado {
            margin-top: 35px;
            display: none;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .resultado.ativo {
            display: block;
        }

        .resultado-header {
            padding: 18px 20px;
            border-radius: 12px;
            margin-bottom: 18px;
            text-align: center;
        }

        .resultado-header.acima {
            background: rgba(230, 57, 70, 0.1);
            border-left: 4px solid var(--danger);
        }

        .resultado-header.abaixo {
            background: rgba(22, 199, 132, 0.1);
            border-left: 4px solid var(--secondary);
        }

        .resultado-header.igual {
            background: rgba(156, 163, 175, 0.1);
            border-left: 4px solid var(--neutral);
        }

        .resultado-titulo {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .resultado-header.acima .resultado-titulo {
            color: var(--danger);
        }

        .resultado-header.abaixo .resultado-titulo {
            color: var(--secondary);
        }

        .resultado-header.igual .resultado-titulo {
            color: var(--neutral);
        }

        .resultado-subtitle {
            font-size: 12px;
            color: var(--neutral);
        }

        .resultado-items {
            display: grid;
            gap: 12px;
        }

        .resultado-item {
            background: var(--light);
            padding: 16px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .resultado-label {
            font-size: 13px;
            color: var(--neutral);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .resultado-valor {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary);
        }

        .resultado-item.diferenca-total {
            background: transparent;
            border-top: 2px solid #e5e7eb;
            padding-top: 16px;
            margin-top: 4px;
        }

        .resultado-item.diferenca-total .resultado-valor {
            font-size: 22px;
        }

        .resultado-item.acima .resultado-valor {
            color: var(--danger);
        }

        .resultado-item.abaixo .resultado-valor {
            color: var(--secondary);
        }

        .resultado-item.igual .resultado-valor {
            color: var(--neutral);
        }

        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
            border-bottom: 2px solid #e5e7eb;
        }

        .tab-btn {
            flex: 1;
            padding: 14px 16px;
            background: none;
            border: none;
            border-bottom: 3px solid transparent;
            color: var(--neutral);
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .tab-btn.ativo {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .tab-content {
            display: none;
        }

        .tab-content.ativo {
            display: block;
        }

        .calculadora-display {
            background: var(--primary);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: right;
            margin-bottom: 24px;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            word-wrap: break-word;
            word-break: break-all;
        }

        .calc-valor {
            font-size: 32px;
            font-weight: 700;
            font-family: 'Courier New', monospace;
        }

        .calc-anterior {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            margin-right: 8px;
        }

        .calculadora-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .calc-btn {
            padding: 16px 8px;
            font-size: 18px;
            font-weight: 600;
            border: 2px solid #e5e7eb;
            background: var(--light);
            color: var(--primary);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .calc-btn:active {
            transform: scale(0.95);
        }

        .calc-btn.operador {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .calc-btn.igual {
            grid-column: 1 / -1;
            background: var(--secondary);
            color: white;
            border-color: var(--secondary);
            font-size: 20px;
        }

        .calc-btn.limpar {
            grid-column: 1 / 3;
            background: #fee2e2;
            color: var(--danger);
            border-color: #fca5a5;
        }

        @media (max-width: 480px) {
            .card {
                padding: 30px 20px;
            }

            .header h1 {
                font-size: 24px;
            }

            input {
                padding: 12px 14px;
                font-size: 16px;
            }

            button {
                padding: 12px 18px;
                font-size: 14px;
            }

            .resultado-header {
                padding: 16px 18px;
            }

            .calc-valor {
                font-size: 28px;
            }

            .calculadora-grid {
                gap: 8px;
            }

            .calc-btn {
                padding: 14px 6px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <h1>Calculadora</h1>
                <p>Ferramentas de cálculo</p>
            </div>

            <div class="tabs">
                <button class="tab-btn ativo" onclick="abaCalculadora()">Calculadora</button>
                <button class="tab-btn" onclick="abaComparador()">Comparador</button>
            </div>

            <!-- ABA CALCULADORA NORMAL -->
            <div id="tabCalculadora" class="tab-content ativo">
                <div class="calculadora-display" id="display">0</div>
                <div class="calculadora-grid">
                    <button class="calc-btn limpar" onclick="calcLimpar()">C</button>
                    <button class="calc-btn operador" onclick="calcOperador('/')">/</button>
                    <button class="calc-btn operador" onclick="calcOperador('*')">×</button>
                    <button class="calc-btn operador" onclick="calcBackspace()">⌫</button>

                    <button class="calc-btn" onclick="calcNumero('7')">7</button>
                    <button class="calc-btn" onclick="calcNumero('8')">8</button>
                    <button class="calc-btn" onclick="calcNumero('9')">9</button>
                    <button class="calc-btn operador" onclick="calcOperador('-')">−</button>

                    <button class="calc-btn" onclick="calcNumero('4')">4</button>
                    <button class="calc-btn" onclick="calcNumero('5')">5</button>
                    <button class="calc-btn" onclick="calcNumero('6')">6</button>
                    <button class="calc-btn operador" onclick="calcOperador('+')">+</button>

                    <button class="calc-btn" onclick="calcNumero('1')">1</button>
                    <button class="calc-btn" onclick="calcNumero('2')">2</button>
                    <button class="calc-btn" onclick="calcNumero('3')">3</button>
                    <button class="calc-btn operador" onclick="calcToggleNegativo()">±</button>

                    <button class="calc-btn" onclick="calcNumero('0')" style="grid-column: 1 / 3;">0</button>
                    <button class="calc-btn" onclick="calcNumero('.')">.</button>
                    <button class="calc-btn igual" onclick="calcIgual()">=</button>
                </div>
            </div>

            <!-- ABA COMPARADOR DE PREÇOS -->
            <div id="tabComparador" class="tab-content">
                <form id="form">
                    <div class="form-group">
                        <label for="precoPDV">Preço do PDV (R$)</label>
                        <input
                            type="number"
                            id="precoPDV"
                            placeholder="0,00"
                            step="0.01"
                            min="0"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="precoEncarte">Preço do Encarte (R$)</label>
                        <input
                            type="number"
                            id="precoEncarte"
                            placeholder="0,00"
                            step="0.01"
                            min="0"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="quantidade">Quantidade</label>
                        <input
                            type="number"
                            id="quantidade"
                            placeholder="1"
                            step="1"
                            min="1"
                            value="1"
                            required
                        >
                    </div>

                    <div class="buttons">
                        <button type="button" class="btn-calcular" onclick="calcular()">
                            Calcular
                        </button>
                        <button type="button" class="btn-limpar" onclick="limpar()">
                            Limpar
                        </button>
                    </div>
                </form>

                <div id="resultado" class="resultado">
                    <div id="resultadoHeader" class="resultado-header">
                        <div class="resultado-titulo" id="mensagem"></div>
                        <div class="resultado-subtitle">Análise de diferença de preço</div>
                    </div>
                    <div class="resultado-items">
                        <div class="resultado-item">
                            <span class="resultado-label">Diferença por Unidade</span>
                            <span class="resultado-valor" id="diferenca"></span>
                        </div>
                        <div class="resultado-item diferenca-total" id="linhaTotal">
                            <span class="resultado-label">Diferença Total (Qtd: <span id="qtdExibida">1</span>)</span>
                            <span class="resultado-valor" id="diferencaTotal"></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // VARIÁVEIS CALCULADORA
        let calcValorAtual = '0';
        let calcValorAnterior = '';
        let calcOperacao = null;
        let calcNovoValor = true;

        // ABAS
        function abaCalculadora() {
            document.getElementById('tabCalculadora').classList.add('ativo');
            document.getElementById('tabComparador').classList.remove('ativo');
            document.querySelectorAll('.tab-btn')[0].classList.add('ativo');
            document.querySelectorAll('.tab-btn')[1].classList.remove('ativo');
        }

        function abaComparador() {
            document.getElementById('tabCalculadora').classList.remove('ativo');
            document.getElementById('tabComparador').classList.add('ativo');
            document.querySelectorAll('.tab-btn')[0].classList.remove('ativo');
            document.querySelectorAll('.tab-btn')[1].classList.add('ativo');
        }

        // CALCULADORA
        function atualizarDisplay() {
            let texto = calcValorAtual;
            if (calcOperacao) {
                texto = `<span class="calc-anterior">${calcValorAnterior} ${calcOperacao}</span> ${calcValorAtual}`;
            }
            document.getElementById('display').innerHTML = texto;
        }

        function calcNumero(num) {
            if (calcNovoValor) {
                calcValorAtual = num;
                calcNovoValor = false;
            } else {
                if (num === '.' && calcValorAtual.includes('.')) return;
                calcValorAtual += num;
            }
            atualizarDisplay();
        }

        function calcOperador(op) {
            if (calcOperacao && !calcNovoValor) {
                calcIgual();
            }
            calcValorAnterior = calcValorAtual;
            calcOperacao = op === '*' ? '×' : op === '/' ? '÷' : op;
            calcNovoValor = true;
            atualizarDisplay();
        }

        function calcIgual() {
            if (!calcOperacao || calcNovoValor) return;
            
            let resultado;
            const anterior = parseFloat(calcValorAnterior);
            const atual = parseFloat(calcValorAtual);

            switch(calcOperacao) {
                case '+': resultado = anterior + atual; break;
                case '−': resultado = anterior - atual; break;
                case '×': resultado = anterior * atual; break;
                case '÷': resultado = anterior / atual; break;
                default: return;
            }

            calcValorAtual = resultado.toString();
            calcOperacao = null;
            calcValorAnterior = '';
            calcNovoValor = true;
            atualizarDisplay();
        }

        function calcLimpar() {
            calcValorAtual = '0';
            calcValorAnterior = '';
            calcOperacao = null;
            calcNovoValor = true;
            atualizarDisplay();
        }

        function calcBackspace() {
            if (calcValorAtual.length > 1) {
                calcValorAtual = calcValorAtual.slice(0, -1);
            } else {
                calcValorAtual = '0';
            }
            atualizarDisplay();
        }

        function calcToggleNegativo() {
            const valor = parseFloat(calcValorAtual);
            calcValorAtual = (valor * -1).toString();
            atualizarDisplay();
        }

        // COMPARADOR
        function formatarMoeda(valor) {
            return new Intl.NumberFormat('pt-BR', {
                style: 'currency',
                currency: 'BRL'
            }).format(valor);
        }

        function calcular() {
            const precoPDV = parseFloat(document.getElementById('precoPDV').value);
            const precoEncarte = parseFloat(document.getElementById('precoEncarte').value);
            const quantidade = parseInt(document.getElementById('quantidade').value) || 1;

            if (!precoPDV && precoPDV !== 0) {
                alert('Informe o preço do PDV');
                return;
            }
            if (!precoEncarte && precoEncarte !== 0) {
                alert('Informe o preço do encarte');
                return;
            }
            if (quantidade < 1) {
                alert('Quantidade mínima é 1');
                return;
            }

            const diferenca = precoPDV - precoEncarte;
            const diferencaTotal = diferenca * quantidade;

            let status;
            let mensagem;
            if (diferenca > 0) {
                status = 'acima';
                mensagem = 'PDV acima do encarte';
            } else if (diferenca < 0) {
                status = 'abaixo';
                mensagem = 'PDV abaixo do encarte';
            } else {
                status = 'igual';
                mensagem = 'PDV igual ao encarte';
            }

            document.getElementById('resultado').classList.add('ativo');
            document.getElementById('resultadoHeader').className = 'resultado-header ' + status;
            document.getElementById('mensagem').textContent = mensagem;
            document.getElementById('diferenca').textContent = formatarMoeda(diferenca);
            document.getElementById('diferenca').parentElement.className = 'resultado-item ' + status;
            document.getElementById('diferencaTotal').textContent = formatarMoeda(diferencaTotal);
            document.getElementById('diferencaTotal').parentElement.className = 'resultado-item diferenca-total ' + status;
            document.getElementById('qtdExibida').textContent = quantidade;
        }

        function limpar() {
            document.getElementById('form').reset();
            document.getElementById('quantidade').value = '1';
            document.getElementById('resultado').classList.remove('ativo');
        }

        document.getElementById('precoPDV').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') calcular();
        });
        document.getElementById('precoEncarte').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') calcular();
        });
        document.getElementById('quantidade').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') calcular();
        });

        atualizarDisplay();
    </script>
</body>
</html>
